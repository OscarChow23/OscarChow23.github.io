<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOvA + JUNO Crystal Ball</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tabler Icons (webfont) -->
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" rel="stylesheet" />

  <!-- Plotly.js -->
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.35.2/plotly.min.js"></script>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./css/main.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════ HEADER ══ -->
  <header id="header">

    <div class="header-left">
      <img src="./assets/NOvALogoPrideChevron.png" alt="NOvA logo" />
      <div class="header-brand">
        <span class="brand-name">NOvA + JUNO</span>
        <span class="brand-sub">Crystal Ball</span>
      </div>
    </div>


  </header>

  <!-- ══════════════════════════════════════════ MAIN ══════ -->
  <main id="main">

    <!-- ── LEFT COLUMN: Parameter Controls ───────────────── -->
    <div class="col col-left">
      <div class="card controls-card">

        <div class="controls-card-header">
          <span class="card-title">Analysis Controls</span>
          <div class="all-params-tag">
            All parameters <i class="ti ti-chevron-down" style="font-size:11px;"></i>
          </div>
        </div>

        <!-- Slider 1: Δm²₃₂ central value -->
        <div class="slider-group">
          <div class="slider-label-row">
            <label for="slider-dm32">
              &Delta;m&sup2;<sub>32</sub> (NO)
              [&times;10<sup>&minus;3</sup> eV&sup2;]
            </label>
            <span class="slider-current-val">2.42</span>
          </div>
          <input
            type="range"
            id="slider-dm32"
            min="2.20" max="2.60" value="2.42" step="0.01"
            style="--fill: 55%;"
          />
          <div class="slider-range-labels">
            <span>2.20</span>
            <span>2.60</span>
          </div>
        </div>

        <!-- Slider 2: JUNO precision -->
        <div class="slider-group">
          <div class="slider-label-row">
            <label for="slider-prec">
              JUNO Precision on
              |&Delta;m&sup2;<sub>32</sub>| [%]
            </label>
            <span class="slider-current-val">0.54</span>
          </div>
          <input
            type="range"
            id="slider-prec"
            min="0.20" max="1.00" value="0.54" step="0.01"
            style="--fill: 42.5%;"
          />
          <div class="slider-range-labels">
            <span>0.20</span>
            <span>1.00</span>
          </div>
        </div>

        <div class="generate-wrap">
          <button id="generate-btn">Generate Triangle Plot</button>
        </div>

      </div>
    </div>

    <!-- ── CENTRE COLUMN: Triangle plot display ───────────── -->
    <div class="col col-center">
      <div class="card plot-card">

        <div class="card-header-row">
          <div>
            <span class="card-title">Triangle Plot</span>
            <span class="card-subtitle">P(&nu;<sub>&mu;</sub> &rarr; &nu;<sub>e</sub>)</span>
          </div>
        </div>

        <div class="plot-placeholder" id="triangle-container">
          <i class="ti ti-photo" style="font-size: 48px; color: #BFCFF7;"></i>
          <p>Click &lsquo;Generate Triangle Plot&rsquo; to load output</p>
        </div>

      </div>
    </div>

    <!-- ── RIGHT COLUMN: Heatmap + Metric cards ───────────── -->
    <div class="col col-right">

      <!-- Heatmap card -->
      <div class="card heatmap-card">
        <div class="card-header-row">
          <div>
            <span class="card-title">Posterior Distributions</span>
            <span class="card-subtitle">Corner Plot</span>
          </div>
        </div>
        <div class="heatmap-wrap">
          <div id="heatmap-plot"></div>
          <div id="heatmap-handle" title="Drag to set parameters"></div>
        </div>
      </div>

      <!-- Metric cards — hidden until Generate is clicked -->
      <div class="metric-cards hidden" id="metric-cards">
        <div class="metric-card">
          <div class="metric-label">Bayes Factor</div>
          <div class="metric-value" id="bf-value">&mdash;</div>
          <div class="metric-sub">log Z</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Significance</div>
          <div class="metric-value" id="sigma-value">&mdash;</div>
          <div class="metric-sub">&sigma;</div>
        </div>
      </div>

    </div>

  </main>

  <!-- ══════════════════════════════════════════ BOTTOM NAV ══ -->
  <nav id="bottom-nav">
    <button class="tab active"><i class="ti ti-chart-line"></i> Analysis</button>
    <button class="tab"><i class="ti ti-database"></i> Data</button>
    <button class="tab"><i class="ti ti-cpu"></i> Models</button>
    <button class="tab"><i class="ti ti-adjustments"></i> Systematic</button>
    <button class="tab"><i class="ti ti-settings"></i> Settings</button>
  </nav>

  <!-- ══════════════════════════════════════════ INTERACTIVITY ══ -->
  <script>
  (function () {
    'use strict';

    // ── Global state ───────────────────────────────────────────
    let gridManifest = [], bfData = [], bfGrid2D = [];
    let dm32Unique = [], precUnique = [];
    let dm32Min, dm32Max, precMin, precMax;
    let currentDm32 = null, currentPrecision = null;
    let triangleImg = null;

    // ── Helpers ────────────────────────────────────────────────
    function padTwo(n) { return String(n).padStart(2, '0'); }

    function fmtNum(x, dp) {
      if (x == null || !isFinite(Number(x))) return '—';
      return Number(x).toFixed(dp);
    }

    function getNearestGridPoint(dm32, precision) {
      const dr = dm32Max - dm32Min || 1;
      const pr = precMax - precMin || 1;
      let best = null, bestDist = Infinity;
      for (const e of gridManifest) {
        const d = Math.sqrt(
          ((e.dm32_no - dm32) / dr) ** 2 +
          ((e.precision - precision) / pr) ** 2
        );
        if (d < bestDist) { bestDist = d; best = e; }
      }
      return best;
    }

    // ── Metric cards ───────────────────────────────────────────
    function updateMetricCards(entry) {
      const mcEl    = document.getElementById('metric-cards');
      const bfEl    = document.getElementById('bf-value');
      const sigmaEl = document.getElementById('sigma-value');

      // reveal cards
      mcEl.classList.remove('hidden');

      if (!entry) {
        bfEl.textContent    = '—';
        sigmaEl.textContent = '—';
        bfEl.style.color    = '#1A2332';
        sigmaEl.style.color = '#1A2332';
        return;
      }

      const bf    = entry.bf    != null ? Number(entry.bf)    : null;
      const sigma = entry.sigma != null ? Number(entry.sigma) : null;

      // BF display
      if (bf == null || !isFinite(bf)) {
        bfEl.textContent = '—';
      } else if (Math.abs(bf) > 9999) {
        bfEl.textContent = bf.toExponential(2);
      } else {
        bfEl.textContent = bf.toFixed(1);
      }

      // Sigma display
      if (sigma == null || !isFinite(sigma)) {
        sigmaEl.textContent = '—';
        sigmaEl.style.color = '#1A2332';
      } else if (sigma >= 8) {
        sigmaEl.textContent = '>8σ';
        sigmaEl.style.color = '#3B82F6';
      } else if (sigma <= -8) {
        sigmaEl.textContent = '<−8σ';
        sigmaEl.style.color = '#EF4444';
      } else {
        sigmaEl.textContent = (sigma >= 0 ? '+' : '') + sigma.toFixed(2) + ' σ';
        sigmaEl.style.color = sigma > 0 ? '#3B82F6' : (sigma < 0 ? '#EF4444' : '#1A2332');
      }

      // BF colour
      if (bf != null && isFinite(bf)) {
        bfEl.style.color = bf > 1 ? '#3B82F6' : (bf < 1 ? '#EF4444' : '#1A2332');
      } else {
        bfEl.style.color = '#1A2332';
      }
    }

    // ── Crosshair ──────────────────────────────────────────────
    function positionHandle(dm32, prec) {
      const el = document.getElementById('heatmap-plot');
      if (!el._fullLayout) return;
      const xa = el._fullLayout.xaxis;
      const ya = el._fullLayout.yaxis;
      const fracX = (dm32 - dm32Min) / (dm32Max - dm32Min);
      const fracY = (prec - precMin) / (precMax - precMin);
      const px = xa._offset + fracX * xa._length;
      const py = ya._offset + (1 - fracY) * ya._length;
      const handle = document.getElementById('heatmap-handle');
      handle.style.left = px + 'px';
      handle.style.top  = py + 'px';
      handle.style.display = 'block';
    }

    function getDataFromPixel(px, py) {
      const el = document.getElementById('heatmap-plot');
      const xa = el._fullLayout.xaxis;
      const ya = el._fullLayout.yaxis;
      const fracX = (px - xa._offset) / xa._length;
      const fracY = 1 - (py - ya._offset) / ya._length;
      return {
        dm32: Math.max(dm32Min, Math.min(dm32Max, dm32Min + fracX * (dm32Max - dm32Min))),
        prec: Math.max(precMin,  Math.min(precMax,  precMin + fracY * (precMax - precMin)))
      };
    }

    function updateHeatmapCrosshair(dm32, precision) {
      Plotly.relayout('heatmap-plot', {
        shapes: [
          {
            type: 'line', xref: 'x', yref: 'y',
            x0: dm32, x1: dm32, y0: precMin, y1: precMax,
            line: { color: '#1A2332', width: 1, dash: 'dot' }, opacity: 0.6
          },
          {
            type: 'line', xref: 'x', yref: 'y',
            x0: dm32Min, x1: dm32Max, y0: precision, y1: precision,
            line: { color: '#1A2332', width: 1, dash: 'dot' }, opacity: 0.6
          }
        ]
      });
      positionHandle(dm32, precision);
    }

    // ── Handle drag ────────────────────────────────────────────
    function wireHandleDrag() {
      const handle = document.getElementById('heatmap-handle');
      const wrap   = document.querySelector('.heatmap-wrap');
      let dragging = false;

      handle.addEventListener('mousedown', e => {
        dragging = true;
        handle.classList.add('dragging');
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const rect = wrap.getBoundingClientRect();
        const { dm32, prec } = getDataFromPixel(e.clientX - rect.left, e.clientY - rect.top);
        currentDm32      = dm32;
        currentPrecision = prec;

        const sliderDm32 = document.getElementById('slider-dm32');
        const sliderPrec = document.getElementById('slider-prec');
        sliderDm32.value = dm32;
        sliderPrec.value = prec;
        setSliderFill(sliderDm32, dm32, dm32Min, dm32Max);
        setSliderFill(sliderPrec, prec, precMin, precMax);
        sliderDm32.closest('.slider-group').querySelector('.slider-current-val').textContent = dm32.toFixed(3);
        sliderPrec.closest('.slider-group').querySelector('.slider-current-val').textContent = prec.toFixed(2);

        updateHeatmapCrosshair(dm32, prec);
        updateMetricCards(getNearestGridPoint(dm32, prec));
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.getElementById('generate-btn').click();
      });
    }

    // ── Heatmap ────────────────────────────────────────────────
    function initHeatmap() {
      // Build O(N) lookup: "dm32_toFixed6|prec_toFixed6" → log10_bf
      const lookup = new Map();
      for (const row of bfData) {
        const key = Number(row.dm32_no).toFixed(6) + '|' + Number(row.precision).toFixed(6);
        const v = Number(row.log10_bf);
        lookup.set(key, isFinite(v) ? v : 0);
      }

      // Build z[j][i]: rows = precUnique (y), columns = dm32Unique (x)
      const zArr = precUnique.map(prec => {
        return dm32Unique.map(dm32 => {
          const key = dm32.toFixed(6) + '|' + prec.toFixed(6);
          return lookup.get(key) ?? 0;
        });
      });

      Plotly.newPlot('heatmap-plot', [{
        type: 'heatmap',
        z: zArr,
        x: dm32Unique,
        y: precUnique,
        colorscale: 'RdBu',
        reversescale: true,
        zmin: -5,
        zmax: 5,
        colorbar: {
          title: { text: 'log₁₀(BF)', side: 'right' },
          tickfont:  { size: 12, family: 'Inter, sans-serif', color: '#5A6A7E' },
          titlefont: { size: 13, family: 'Inter, sans-serif', color: '#5A6A7E' }
        }
      }], {
        xaxis: {
          title: { text: 'Δm²₃₂ (NO) [×10⁻³ eV²]', font: { size: 14 } },
          tickfont: { size: 13 }, color: '#5A6A7E'
        },
        yaxis: {
          title: { text: 'JUNO Precision on |Δm²₃₂| [%]', font: { size: 14 } },
          tickfont: { size: 13 }, color: '#5A6A7E'
        },
        autosize: true,
        margin: { l: 70, r: 80, t: 25, b: 70 },
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor:  'rgba(0,0,0,0)',
        font: { family: 'Inter, sans-serif', color: '#5A6A7E' },
        shapes: []
      }, { displayModeBar: false, staticPlot: true })
      .then(() => updateHeatmapCrosshair(currentDm32, currentPrecision));
    }

    // ── Sliders ────────────────────────────────────────────────
    function setSliderFill(el, val, min, max) {
      const pct = ((val - min) / (max - min) * 100).toFixed(1);
      el.style.setProperty('--fill', pct + '%');
    }

    function initSliders() {
      const sliderDm32 = document.getElementById('slider-dm32');
      const sliderPrec = document.getElementById('slider-prec');
      const dm32Readout = sliderDm32.closest('.slider-group').querySelector('.slider-current-val');
      const precReadout = sliderPrec.closest('.slider-group').querySelector('.slider-current-val');

      sliderDm32.addEventListener('input', () => {
        currentDm32 = Number(sliderDm32.value);
        setSliderFill(sliderDm32, currentDm32, dm32Min, dm32Max);
        dm32Readout.textContent = currentDm32.toFixed(3);
        updateMetricCards(getNearestGridPoint(currentDm32, currentPrecision));
        updateHeatmapCrosshair(currentDm32, currentPrecision);
      });

      sliderPrec.addEventListener('input', () => {
        currentPrecision = Number(sliderPrec.value);
        setSliderFill(sliderPrec, currentPrecision, precMin, precMax);
        precReadout.textContent = currentPrecision.toFixed(2);
        updateMetricCards(getNearestGridPoint(currentDm32, currentPrecision));
        updateHeatmapCrosshair(currentDm32, currentPrecision);
      });
    }

    // ── Generate button ────────────────────────────────────────
    function wireGenerateButton() {
      document.getElementById('generate-btn').addEventListener('click', () => {
        const nearest = getNearestGridPoint(currentDm32, currentPrecision);
        if (!nearest) return;

        const path = '../../triangles/v3/triangle_i' + padTwo(nearest.i) +
                     '_j' + padTwo(nearest.j) + '.png';
        const container = document.getElementById('triangle-container');
        const subtitle  = document.querySelector('.col-center .card-subtitle');

        triangleImg.onload = () => {
          // hide placeholder children (icon + caption text)
          Array.from(container.children).forEach(c => {
            if (c !== triangleImg) c.style.display = 'none';
          });
          triangleImg.style.display = 'block';
          triangleImg.style.opacity = '0';
          requestAnimationFrame(() => {
            requestAnimationFrame(() => { triangleImg.style.opacity = '1'; });
          });

          let sub = 'dm32 = ' + nearest.dm32_no.toFixed(3) +
                    ' × 10⁻³ eV²  ·  prec = ' +
                    nearest.precision.toFixed(2) + '%';
          if (Math.abs(currentDm32 - nearest.dm32_no) > 1e-4 ||
              Math.abs(currentPrecision - nearest.precision) > 1e-4) {
            sub += '  ·  nearest grid point';
          }
          subtitle.textContent = sub;
          updateMetricCards(nearest);
        };

        triangleImg.onerror = () => {
          Array.from(container.children).forEach(c => {
            if (c !== triangleImg) c.style.display = '';
          });
          triangleImg.style.display = 'none';
          subtitle.textContent = 'Triangle plot not found for this grid point.';
        };

        triangleImg.src = path;
        // handle already-cached image
        if (triangleImg.complete && triangleImg.naturalWidth) triangleImg.onload();
      });
    }

    // ── Data loading ───────────────────────────────────────────
    function showError(msg) {
      let banner = document.getElementById('v2-error-banner');
      if (!banner) {
        banner = document.createElement('div');
        banner.id = 'v2-error-banner';
        banner.style.cssText = [
          'background:#FEF2F2', 'border:1px solid #FECACA', 'color:#991B1B',
          'font-size:13px', 'padding:10px 20px', 'text-align:center',
          'position:fixed', 'top:60px', 'left:0', 'right:0', 'z-index:200'
        ].join(';');
        document.body.insertBefore(banner, document.getElementById('main'));
      }
      banner.textContent = msg;
    }

    async function loadData() {
      try {
        const [csvText, jsonText] = await Promise.all([
          fetch('../../data/bf_grid.csv').then(r => { if (!r.ok) throw new Error('bf_grid.csv ' + r.status); return r.text(); }),
          fetch('../../data/manifest.json').then(r => { if (!r.ok) throw new Error('manifest.json ' + r.status); return r.text(); })
        ]);

        // Parse CSV
        const lines = csvText.split('\n').map(l => l.trim()).filter(Boolean);
        const headers = lines[0].split(',');
        bfData = lines.slice(1).map(line => {
          const vals = line.split(',');
          const obj = {};
          headers.forEach((h, k) => { obj[h] = Number(vals[k]); });
          return obj;
        });

        // Build sparse 2D lookup bfGrid2D[i][j]
        bfGrid2D = [];
        for (const row of bfData) {
          const i = row.i, j = row.j;
          if (!bfGrid2D[i]) bfGrid2D[i] = {};
          bfGrid2D[i][j] = row;
        }

        // Parse manifest (sanitise non-finite JSON tokens)
        const safeJson = jsonText.replace(/-?Infinity|NaN/g, 'null');
        gridManifest = JSON.parse(safeJson);

        // Derive unique sorted axes
        dm32Unique = [...new Set(gridManifest.map(e => e.dm32_no))].sort((a, b) => a - b);
        precUnique = [...new Set(gridManifest.map(e => e.precision))].sort((a, b) => a - b);
        dm32Min = dm32Unique[0];
        dm32Max = dm32Unique[dm32Unique.length - 1];
        precMin = precUnique[0];
        precMax = precUnique[precUnique.length - 1];

        // Initial slider positions — grid midpoints
        const midDm32 = dm32Unique[Math.floor(dm32Unique.length / 2)];
        const midPrec  = precUnique[Math.floor(precUnique.length / 2)];
        currentDm32 = midDm32;
        currentPrecision = midPrec;

        // Configure slider elements
        const sliderDm32 = document.getElementById('slider-dm32');
        const sliderPrec = document.getElementById('slider-prec');

        sliderDm32.min   = dm32Min;
        sliderDm32.max   = dm32Max;
        sliderDm32.step  = 0.001;
        sliderDm32.value = midDm32;

        sliderPrec.min   = precMin;
        sliderPrec.max   = precMax;
        sliderPrec.step  = 0.001;
        sliderPrec.value = midPrec;

        // Range labels
        const dm32Labels = sliderDm32.closest('.slider-group').querySelectorAll('.slider-range-labels span');
        dm32Labels[0].textContent = dm32Min.toFixed(3);
        dm32Labels[1].textContent = dm32Max.toFixed(3);

        const precLabels = sliderPrec.closest('.slider-group').querySelectorAll('.slider-range-labels span');
        precLabels[0].textContent = precMin.toFixed(2);
        precLabels[1].textContent = precMax.toFixed(2);

        // Live readouts
        sliderDm32.closest('.slider-group').querySelector('.slider-current-val').textContent = midDm32.toFixed(3);
        sliderPrec.closest('.slider-group').querySelector('.slider-current-val').textContent = midPrec.toFixed(2);

        // Slider fill
        setSliderFill(sliderDm32, midDm32, dm32Min, dm32Max);
        setSliderFill(sliderPrec, midPrec, precMin, precMax);

        // Dynamically create triangle img (hidden initially)
        triangleImg = document.createElement('img');
        triangleImg.style.cssText = 'display:none; opacity:0; transition:opacity 0.3s ease;';
        document.getElementById('triangle-container').appendChild(triangleImg);

        // Boot subsystems
        initHeatmap();
        initSliders();
        wireGenerateButton();
        wireHandleDrag();

        // Show metric cards immediately with nearest-midpoint data
        updateMetricCards(getNearestGridPoint(midDm32, midPrec));

      } catch (err) {
        showError('Failed to load data: ' + err.message +
                  '. Run the pipeline and serve from the repo root.');
      }
    }

    document.addEventListener('DOMContentLoaded', loadData);
  })();
  </script>

  <!-- ══════════════════════════════════════════ PLOTLY INIT ══ -->
  <script>
    (function () {
      // Synthetic 2D Gaussian for the corner-plot style heatmap
      const SIZE = 50;
      const z = [];
      for (let i = 0; i < SIZE; i++) {
        const row = [];
        for (let j = 0; j < SIZE; j++) {
          const x = (j - SIZE / 2) / (SIZE / 7);
          const y = (i - SIZE / 2) / (SIZE / 7);
          // Slightly asymmetric Gaussian to look like a posterior
          row.push(Math.exp(-(x * x * 0.9 + y * y * 1.1 + 0.3 * x * y) / 2));
        }
        z.push(row);
      }
      // Map to diverging: peak → blue side, tails → red side
      const zDiv = z.map(row => row.map(v => (v - 0.4) * 2.5));

      const data = [{
        type: 'heatmap',
        z: zDiv,
        colorscale: 'RdBu',
        reversescale: true,
        showscale: false,
        zsmooth: 'best',
        zmin: -1,
        zmax: 1,
      }];

      const layout = {
        xaxis: {
          title: {
            text: 'sin²(θ₁₂)',
            font: { family: 'Inter', size: 10, color: '#8A9BB0' }
          },
          showgrid: false,
          linecolor: '#DDE3ED',
          linewidth: 1,
          tickfont: { family: 'Inter', size: 10, color: '#8A9BB0' },
          nticks: 5,
        },
        yaxis: {
          title: {
            text: 'δ_CP',
            font: { family: 'Inter', size: 10, color: '#8A9BB0' }
          },
          showgrid: false,
          linecolor: '#DDE3ED',
          linewidth: 1,
          tickfont: { family: 'Inter', size: 10, color: '#8A9BB0' },
          nticks: 5,
        },
        margin: { l: 42, r: 10, t: 10, b: 42 },
        paper_bgcolor: 'transparent',
        plot_bgcolor: 'transparent',
      };

      const config = { responsive: true, displayModeBar: false };

      Plotly.newPlot('heatmap-plot', data, layout, config);
    })();
  </script>

</body>
</html>
